version: '3.8'

services:
  tests:
    build: .
    environment:
      - CI=true
      - STANDARD_USER=standard_user
      - TEST_PASSWORD=secret_sauce
      - LOCKED_USER=locked_out_user
    volumes:
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results

  tests-ui:
    build: .
    command: npx playwright test tests/ui/ --project=ui-chrome
    environment:
      - CI=true
      - STANDARD_USER=standard_user
      - TEST_PASSWORD=secret_sauce
      - LOCKED_USER=locked_out_user
    volumes:
      - ./playwright-report:/app/playwright-report

  tests-api:
    build: .
    command: npx playwright test tests/api/ --project=api
    environment:
      - CI=true
    volumes:
      - ./playwright-report:/app/playwright-report
